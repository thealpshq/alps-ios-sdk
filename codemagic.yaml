workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build iOS SDK
        script: |
          xcodebuild build -scheme AlpsSDK -configuration Release -destination generic/platform=iOS
    artifacts:
      - .build/release/**/*.xcframework

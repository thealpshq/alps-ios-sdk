workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build and Archive Example App
        script: |
          xcodebuild archive \
            -project Example/AlpsSDKExample.xcodeproj \
            -scheme AlpsSDKExample \
            -configuration Release \
            -archivePath build/Alps.xcarchive \
            -destination generic/platform=iOS
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/Alps.xcarchive \
            -exportOptionsPlist Example/ExportOptions.plist \
            -exportPath build/ipa
    artifacts:
      - build/ipa/**/*.ipa

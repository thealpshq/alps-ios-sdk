workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build & Test App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build Test App for Device
        script: |
          xcodebuild archive \
            -scheme AlpsSDKExample \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build-output/AlpsSDKExample.xcarchive \
            -derivedDataPath build-output
      - name: Create IPA for BrowserStack
        script: |
          mkdir -p build-output/ExportOptions
          cat > build-output/ExportOptions/options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build-output/AlpsSDKExample.xcarchive \
            -exportOptionsPlist build-output/ExportOptions/options.plist \
            -exportPath build-output/ipa-export
      - name: Prepare for BrowserStack
        script: |
          mkdir -p build-output/browserstack
          cp build-output/ipa-export/*.ipa build-output/browserstack/
          echo "IPA ready for BrowserStack testing"
    artifacts:
      - build-output/browserstack/**/*.ipa

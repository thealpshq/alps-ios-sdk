workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build iOS SDK
        script: |
          swift build -c release --arch arm64 --triple aarch64-apple-ios15.0 2>&1 | head -50
    artifacts:
      - .build/release/**/*.swiftmodule
      - .build/release/**/*.swiftinterface

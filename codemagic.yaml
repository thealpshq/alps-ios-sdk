workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build iOS SDK Framework
        script: |
          xcodebuild build \
            -scheme AlpsSDK \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath build-output
    artifacts:
      - build-output/Build/Products/Release-iphoneos/AlpsSDK.swiftmodule/**/*

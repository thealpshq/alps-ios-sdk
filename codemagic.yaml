workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build & Test App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build Test App for Device
        script: |
          xcodebuild archive \
            -scheme AlpsSDKExample \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build-output/AlpsSDKExample.xcarchive \
            -derivedDataPath build-output \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Create IPA for BrowserStack
        script: |
          xcodebuild -exportArchive \
            -archivePath build-output/AlpsSDKExample.xcarchive \
            -exportPath build-output/ipa-export \
            -exportOptionsPlist <(cat <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>provisioningProfiles</key>
            <dict/>
            <key>signingCertificate</key>
            <string>Apple Development</string>
          </dict>
          </plist>
          EOF
          )
      - name: Prepare for BrowserStack
        script: |
          mkdir -p build-output/browserstack
          cp build-output/ipa-export/*.ipa build-output/browserstack/
          echo "IPA ready for BrowserStack testing"
    artifacts:
      - build-output/browserstack/**/*.ipa

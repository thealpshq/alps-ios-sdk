workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build & Test App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build Test App Archive
        script: |
          xcodebuild archive \
            -project Example/AlpsSDKExample.xcodeproj \
            -scheme AlpsSDKExample \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build-output/AlpsSDKExample.xcarchive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build-output/AlpsSDKExample.xcarchive \
            -exportPath build-output/ipa \
            -exportOptionsPlist export-options.plist
    artifacts:
      - build-output/ipa/**/*.ipa

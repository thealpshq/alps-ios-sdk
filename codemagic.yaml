workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build for iOS Device
        script: |
          xcodebuild build-for-distribution \
            -scheme AlpsSDK \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath .build \
            -archivePath build/AlpsSDK-iOS.xcarchive
      - name: Build for iOS Simulator
        script: |
          xcodebuild build-for-distribution \
            -scheme AlpsSDK \
            -configuration Release \
            -destination generic/platform=iOS\ Simulator \
            -derivedDataPath .build \
            -archivePath build/AlpsSDK-Simulator.xcarchive
      - name: Create XCFramework
        script: |
          xcodebuild -create-xcframework \
            -framework build/AlpsSDK-iOS.xcarchive/Products/Library/Frameworks/AlpsSDK.framework \
            -framework build/AlpsSDK-Simulator.xcarchive/Products/Library/Frameworks/AlpsSDK.framework \
            -output build/AlpsSDK.xcframework
    artifacts:
      - build/AlpsSDK.xcframework

workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build & Test App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build Test App Archive
        script: |
          xcodebuild archive \
            -scheme AlpsSDKExample \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build-output/AlpsSDKExample.xcarchive
      - name: Create IPA
        script: |
          mkdir -p build-output/Payload
          cp -r build-output/AlpsSDKExample.xcarchive/Products/Applications/AlpsSDKExample.app build-output/Payload/
          cd build-output
          zip -r AlpsSDKExample.ipa Payload/
          mkdir -p ipa
          mv AlpsSDKExample.ipa ipa/
    artifacts:
      - build-output/ipa/**/*.ipa

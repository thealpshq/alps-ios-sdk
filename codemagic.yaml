workflows:
  ios-sdk-build:
    name: Alps iOS SDK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build Example App
        script: |
          xcodebuild archive -scheme AlpsSDKExample -configuration Release -destination generic/platform=iOS -archivePath build/AlpsSDKExample.xcarchive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive -archivePath build/AlpsSDKExample.xcarchive -exportOptionsPlist Example/ExportOptions.plist -exportPath build/ipa
    artifacts:
      - build/ipa/**/*.ipa
